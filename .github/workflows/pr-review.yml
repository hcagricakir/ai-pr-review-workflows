name: Reusable PR Review

on:
  workflow_call:
    inputs:
      review_profile:
        description: Shared review profile bundle to apply, for example java or java-spring
        required: true
        type: string
      extra_rules_path:
        description: Optional file or directory in the caller repository for extra markdown rules
        required: false
        default: ".github/review"
        type: string
      reviewer_repo:
        description: Deprecated. The reviewer engine now ships inside ai-pr-review-workflows and this input is ignored.
        required: false
        default: ""
        type: string
      reviewer_ref:
        description: Deprecated. The reviewer engine now ships inside ai-pr-review-workflows and this input is ignored.
        required: false
        default: ""
        type: string
      workflow_ref:
        description: Optional git ref used to checkout shared workflow assets. Defaults to the same ref that invoked this reusable workflow.
        required: false
        default: ""
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}

    steps:
      - name: Resolve pull request context
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.eventName === 'pull_request'
                ? context.payload.pull_request?.number
                : context.eventName === 'issue_comment' && context.payload.issue?.pull_request
                  ? context.payload.issue.number
                  : null;

            if (!prNumber) {
              core.setFailed('This reusable workflow must be called from a pull_request event or a PR issue_comment event.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);

      - name: Guard issue_comment execution for same-repository pull requests
        if: ${{ github.event_name == 'issue_comment' && steps.pr-context.outputs.head_repo != github.repository }}
        shell: bash
        run: |
          echo "Comment-triggered reviews are only enabled for pull requests whose head repository matches ${GITHUB_REPOSITORY}."
          exit 1

      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-context.outputs.head_sha }}

      - name: Resolve shared workflow assets ref
        id: workflow-assets-ref
        shell: bash
        run: |
          set -euo pipefail
          workflow_ref='${{ inputs.workflow_ref }}'
          if [[ -z "${workflow_ref}" ]]; then
            workflow_ref='${{ github.workflow_ref }}'
            workflow_ref="${workflow_ref##*@}"
          fi
          echo "value=${workflow_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout shared workflow repository
        uses: actions/checkout@v4
        with:
          repository: hcagricakir/ai-pr-review-workflows
          ref: ${{ steps.workflow-assets-ref.outputs.value }}
          path: .ai-pr-review-workflows

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build reviewer engine
        working-directory: .ai-pr-review-workflows/reviewer-engine
        run: ./mvnw -q -DskipTests package

      - name: Combine review rules
        shell: bash
        run: |
          set -euo pipefail
          bash .ai-pr-review-workflows/scripts/compose-review-rules.sh \
            ".ai-pr-review-workflows/review-rules" \
            "${{ inputs.review_profile }}" \
            "${RUNNER_TEMP}/combined-review-rules.md" \
            "${{ inputs.extra_rules_path }}"
          echo "COMBINED_RULES_FILE=${RUNNER_TEMP}/combined-review-rules.md" >> "$GITHUB_ENV"

      - name: Validate OpenAI credential availability
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "::error::OPENAI_API_KEY is not available to the reusable workflow."
            echo "::error::Reusable workflows cannot directly consume secrets stored only in the workflow repository."
            echo "::error::Provide the key from the caller context, ideally through an organization Actions secret shared with consuming repositories and pass it using secrets: inherit."
            exit 1
          fi

      - name: Summarize review configuration
        shell: bash
        run: |
          {
            echo "### AI PR Review"
            echo "- Review profile: \`${{ inputs.review_profile }}\`"
            echo "- Repo-local rules path: \`${{ inputs.extra_rules_path }}\`"
            echo "- Shared workflow assets ref: \`${{ steps.workflow-assets-ref.outputs.value }}\`"
            echo "- Reviewer engine: \`internal (.ai-pr-review-workflows/reviewer-engine)\`"
            echo "- OpenAI model: \`${OPENAI_MODEL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run reviewer engine and publish PR comments
        working-directory: .ai-pr-review-workflows/reviewer-engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_BASE_BRANCH: ${{ steps.pr-context.outputs.base_ref }}
        run: |
          echo "Using OpenAI model: ${OPENAI_MODEL}"
          java -jar target/ai-pr-reviewer.jar \
            review \
            --config config/application.example.yml \
            --github-pr "${{ steps.pr-context.outputs.number }}" \
            --provider openai \
            --output-format markdown \
            --publish-github-review-comments \
            --extra-rules-file "${COMBINED_RULES_FILE}"
